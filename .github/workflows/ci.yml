name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.version == 'nightly' }}
    strategy:
      fail-fast: false
      matrix:
        version:
          - '1.11'
        os:
          - ubuntu-latest
          - macos-latest
        include:
          - version: 'nightly'
            os: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}

      - uses: julia-actions/cache@v2

      - name: Configure git credentials
        run: |
          git config --global url."https://x-access-token:${{ secrets.PKG_TOKEN || secrets.GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"

      # Install dependencies from GitHub
      - name: Install dependencies
        env:
          JULIA_PKG_USE_CLI_GIT: "true"
        run: |
          julia --project=. -e '
            using Pkg
            Pkg.add(url="https://github.com/brandon-behring/AnnuityData.jl")
            Pkg.add(url="https://github.com/brandon-behring/AnnuityCore.jl")
            Pkg.instantiate()
          '

      - uses: julia-actions/julia-runtest@v1

      - uses: julia-actions/julia-processcoverage@v1
        if: matrix.version == '1.11' && matrix.os == 'ubuntu-latest'

      - uses: codecov/codecov-action@v4
        if: matrix.version == '1.11' && matrix.os == 'ubuntu-latest'
        with:
          files: lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}

  # Code quality checks
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: julia-actions/setup-julia@v2
        with:
          version: '1.11'

      - uses: julia-actions/cache@v2

      - name: Configure git credentials
        run: |
          git config --global url."https://x-access-token:${{ secrets.PKG_TOKEN || secrets.GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Install dependencies
        env:
          JULIA_PKG_USE_CLI_GIT: "true"
        run: |
          julia --project=. -e '
            using Pkg
            Pkg.add(url="https://github.com/brandon-behring/AnnuityData.jl")
            Pkg.add(url="https://github.com/brandon-behring/AnnuityCore.jl")
            Pkg.instantiate()
            Pkg.add(["Aqua", "JuliaFormatter"])
          '

      - name: Aqua.jl quality checks
        run: |
          julia --project=. -e '
            using Aqua
            using AnnuityProducts
            Aqua.test_all(AnnuityProducts; ambiguities=false, stale_deps=(ignore=[:JuliaFormatter, :Aqua],), deps_compat=(check_extras=false,))
          '

      - name: Check formatting
        run: |
          julia --project=. -e '
            using JuliaFormatter
            result = format("src/", BlueStyle())
            result || error("Files not formatted according to BlueStyle")
          '
